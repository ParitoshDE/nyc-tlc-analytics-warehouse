name: dbt CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  dbt-parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery==1.11.*

      - name: Parse project
        env:
          DBT_PROFILES_DIR: dbt
          GCP_PROJECT_ID: ci-placeholder
          BQ_PROD_DATASET: nyc_tlc_prod
          GCP_REGION: us-central1
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/unused-key.json
        run: |
          dbt deps --project-dir dbt --profiles-dir dbt
          dbt parse --project-dir dbt --profiles-dir dbt

  dbt-build-and-test:
    runs-on: ubuntu-latest
    if: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery==1.11.*

      - name: Write GCP key file
        run: |
          printf '%s' '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json

      - name: Run dbt build
        env:
          DBT_PROFILES_DIR: dbt
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BQ_RAW_DATASET: ${{ secrets.BQ_RAW_DATASET }}
          BQ_PROD_DATASET: ${{ secrets.BQ_PROD_DATASET }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          dbt deps --project-dir dbt --profiles-dir dbt
          dbt run --project-dir dbt --profiles-dir dbt
          dbt test --project-dir dbt --profiles-dir dbt
