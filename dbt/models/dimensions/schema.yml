version: 2

models:
  - name: dim_product
    description: "Zone dimension — one row per taxi zone id"
    columns:
      - name: location_id
        tests:
          - unique
          - not_null

  - name: dim_user
    description: "Vendor dimension — trip and revenue stats per vendor"
    columns:
      - name: vendor_id
        tests:
          - unique
          - not_null

  - name: dim_session
    description: "Payment type dimension — trip and revenue stats by payment type"
    columns:
      - name: payment_type
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Calendar dimension derived from event dates"
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
