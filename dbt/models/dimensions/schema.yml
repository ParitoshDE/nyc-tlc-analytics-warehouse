version: 2

models:
  - name: dim_product
    description: "Product dimension — one row per product_id with latest brand/category"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_user
    description: "User dimension — first/last seen, session counts, purchase counts"
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: dim_session
    description: "Session dimension — duration, event counts, funnel flags, revenue"
    columns:
      - name: user_session
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Calendar dimension derived from event dates"
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
