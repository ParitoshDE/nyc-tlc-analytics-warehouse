version: 2

sources:
  - name: ecommerce_raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('BQ_RAW_DATASET', 'ecommerce_raw') }}"
    tables:
      - name: events
        description: "Raw eCommerce behavior events loaded from Spark Parquet output"

models:
  - name: stg_events
    description: "Cleaned and typed events from the raw layer"
    columns:
      - name: event_time
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['view', 'cart', 'remove_from_cart', 'purchase']
      - name: user_id
        tests:
          - not_null
      - name: user_session
        tests:
          - not_null
      - name: price
        tests:
          - not_null
