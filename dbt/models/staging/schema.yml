version: 2

sources:
  - name: nyc_tlc_raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('BQ_RAW_DATASET', 'nyc_tlc_raw') }}"
    tables:
      - name: trips
        description: "Raw NYC TLC trips loaded from Spark parquet output"

models:
  - name: stg_events
    description: "Cleaned and typed NYC TLC trips from the raw layer"
    columns:
      - name: pickup_datetime
        tests:
          - not_null
      - name: pickup_date
        tests:
          - not_null
      - name: pulocation_id
        tests:
          - not_null
      - name: dolocation_id
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
