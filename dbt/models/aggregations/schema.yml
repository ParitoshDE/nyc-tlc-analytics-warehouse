version: 2

models:
  - name: agg_funnel_by_category
    description: "Conversion funnel rates (view‚Üícart‚Üípurchase) by product category"
    columns:
      - name: category_level1
        tests:
          - not_null
      - name: total_sessions
        tests:
          - not_null

  - name: agg_brand_performance
    description: "Brand-level revenue, order count, AOV, and conversion rate"
    columns:
      - name: brand
        tests:
          - unique
          - not_null

  - name: agg_hourly_traffic
    description: "Hourly traffic heatmap ‚Äî events, conversions, revenue by hour and day_of_week"
    columns:
      - name: hour
        tests:
          - not_null
      - name: day_of_week
        tests:
          - not_null

  - name: agg_cart_abandonment
    description: "Cart abandonment analysis ‚Äî sessions with cart but no purchase, by date/category/brand"
    columns:
      - name: session_date
        tests:
          - not_null
