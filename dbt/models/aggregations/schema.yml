version: 2

models:
  - name: agg_funnel_by_category
    description: "Trip volume and fare metrics by pickup zone"
    columns:
      - name: pulocation_id
        tests:
          - not_null
      - name: total_trips
        tests:
          - not_null

  - name: agg_brand_performance
    description: "Payment-type performance metrics"
    columns:
      - name: payment_type
        tests:
          - unique
          - not_null

  - name: agg_hourly_traffic
    description: "Hourly traffic and revenue by day_of_week"
    columns:
      - name: pickup_hour
        tests:
          - not_null
      - name: day_of_week
        tests:
          - not_null

  - name: agg_cart_abandonment
    description: "Top zone pairs by date with trip and revenue metrics"
    columns:
      - name: pickup_date
        tests:
          - not_null
