version: 2

models:
  - name: fct_event
    description: "Trip fact table — one row per taxi trip with surrogate key"
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: pickup_date
        tests:
          - not_null
      - name: pulocation_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_product')
                field: location_id
      - name: vendor_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_user')
                field: vendor_id
