version: 2

models:
  - name: fct_event
    description: "Event fact table — one row per user event with surrogate key"
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - not_null
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: user_id
        tests:
          - relationships:
              to: ref('dim_user')
              field: user_id
